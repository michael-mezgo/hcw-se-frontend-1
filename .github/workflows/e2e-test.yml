name: E2E Tests

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Frontend
        uses: actions/checkout@v4

      - name: Checkout Backend
        uses: actions/checkout@v4
        with:
          repository: michael-mezgo/hcw-se-backend-1
          ref: ${{ github.head_ref }}
          token: ${{ secrets.E2E_PAT }}
          path: services/backend
        continue-on-error: true

      - name: Fallback Backend to main
        run: |
          if [ ! -d "services/backend/.git" ]; then
            git clone --branch main \
              https://x-access-token:${{ secrets.E2E_PAT }}@github.com/michael-mezgo/hcw-se-backend-1.git \
              services/backend
          fi

      - name: Checkout WSDL
        uses: actions/checkout@v4
        with:
          repository: michael-mezgo/hcw-se-currency-converter-1
          ref: ${{ github.head_ref }}
          token: ${{ secrets.E2E_PAT }}
          path: services/wsdl
        continue-on-error: true

      - name: Fallback WSDL to main
        run: |
          if [ ! -d "services/wsdl/.git" ]; then
            git clone --branch main \
              https://x-access-token:${{ secrets.E2E_PAT }}@github.com/michael-mezgo/hcw-se-currency-converter-1.git \
              services/wsdl
          fi

      - name: Start Backend & WSDL
        run: docker compose -f docker-compose.e2e.yml up -d --build

      - name: Run Cypress
        uses: cypress-io/github-action@v6
        with:
          start: npm run dev
          wait-on: 'http://localhost:5173, http://localhost:8080, tcp://localhost:5001'
          wait-on-timeout: 180
          browser: chrome
          headed: false

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-screenshots
          path: cypress/screenshots/
          retention-days: 7

      - name: Upload videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cypress-videos
          path: cypress/videos/
          retention-days: 7

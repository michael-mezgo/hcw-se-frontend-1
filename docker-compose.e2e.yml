services:
  backend:
    build:
      context: ./services/backend
    ports:
      - "8080:8080"
    environment:
      WSDL_URL: http://wsdl:8080
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  wsdl:
    build:
      context: ./services/wsdl
    ports:
      - "5001:8080"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s